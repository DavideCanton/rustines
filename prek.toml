[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [{ id = "end-of-file-fixer" }, { id = "check-toml" }]

[[repos]]
repo = "https://github.com/AndrejOrsula/pre-commit-cargo"
rev = "0.4.0"
hooks = [{ id = "cargo-fmt", "args" = ["--check"] }, { id = "cargo-clippy" }]
